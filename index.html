<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Google Fonts for Lao (Noto Sans Lao) & English/Numbers (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <title>World Time Zone Clock</title>
  <style>
    body { 
      font-family: "Noto Sans Lao", "Inter", sans-serif; 
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      color: #333; 
      margin: 0;
      padding: 0;
    }
    h1 { 
      text-align:center; 
      margin-top: 1.5rem;
      font-size: 2.2rem;
      color: #222;
    }
    select { 
      margin: 1.5rem auto; 
      display:block; 
      padding:0.7rem 1rem; 
      border-radius: 12px; 
      border: 1px solid #ddd; 
      font-size: 1rem;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    select:hover {
      border-color: #2196f3;
      box-shadow: 0 6px 14px rgba(33, 150, 243, 0.25);
    }
    .clock-container { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 1.5rem; 
      justify-content: center; 
      margin: 2rem auto;
      max-width: 1200px;
    }
    .clock { 
      background: rgba(255,255,255,0.3); 
      backdrop-filter: blur(10px);
      padding: 1.5rem 2rem; 
      border-radius: 20px; 
      min-width: 250px; 
      text-align: center; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .clock:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    }
    .zone { 
      font-size: 1rem; 
      color: #444; 
      margin-bottom: 0.6rem; 
      display:flex; 
      justify-content:center; 
      align-items:center; 
      gap:0.4rem; 
      font-weight: 600;
    }
    .zone small {
      display:block;
      font-size: 0.8rem;
      color:#777;
      margin-top:2px;
    }
    .time { 
      font-size: 2rem; 
      font-weight: bold; 
      letter-spacing: 2px; 
      color: #222;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h1>🌍 World Time Zone Digital Clock</h1>

  <select id="countrySelect">
    <option value="">-- Select a Country --</option>
  </select>

  <div class="clock-container" id="clock-container"></div>

  <script>
    // 🌍 World countries with flags + time zones (sample subset, can be extended)
    const countries = [
      { name: "United States", flag: "🇺🇸", timeZones: ["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles"] },
      { name: "United Kingdom", flag: "🇬🇧", timeZones: ["Europe/London"] },
      { name: "Canada", flag: "🇨🇦", timeZones: ["America/Toronto", "America/Vancouver", "America/Halifax"] },
      { name: "Brazil", flag: "🇧🇷", timeZones: ["America/Sao_Paulo", "America/Manaus"] },
      { name: "India", flag: "🇮🇳", timeZones: ["Asia/Kolkata"] },
      { name: "China", flag: "🇨🇳", timeZones: ["Asia/Shanghai"] },
      { name: "Japan", flag: "🇯🇵", timeZones: ["Asia/Tokyo"] },
      { name: "Australia", flag: "🇦🇺", timeZones: ["Australia/Sydney", "Australia/Perth"] },
      { name: "Russia", flag: "🇷🇺", timeZones: ["Europe/Moscow", "Asia/Yekaterinburg", "Asia/Vladivostok"] },
      { name: "South Africa", flag: "🇿🇦", timeZones: ["Africa/Johannesburg"] },
      { name: "Mexico", flag: "🇲🇽", timeZones: ["America/Mexico_City"] },
      { name: "Germany", flag: "🇩🇪", timeZones: ["Europe/Berlin"] },
      { name: "France", flag: "🇫🇷", timeZones: ["Europe/Paris"] },
      { name: "Thailand", flag: "🇹🇭", timeZones: ["Asia/Bangkok"] },
      { name: "Lao PDR", flag: "🇱🇦", timeZones: ["Asia/Vientiane"] },
      
      // 👉 You can keep adding until you cover all ~200 countries
    ];

    // Populate dropdown
    const select = document.getElementById("countrySelect");
    countries.forEach((c, idx) => {
      const opt = document.createElement("option");
      opt.value = idx;
      opt.textContent = `${c.flag} ${c.name}`;
      select.appendChild(opt);
    });

    function updateClocks(country) {
      const container = document.getElementById('clock-container');
      container.innerHTML = '';
      if (!country) return;

      const now = new Date();
      country.timeZones.forEach(tz => {
        const timeStr = now.toLocaleTimeString('en-US', {
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false, timeZone: tz
        });
        const div = document.createElement('div');
        div.className = 'clock';
        div.innerHTML = `<div class="zone">${country.flag} ${country.name}<small>${tz}</small></div>
                         <div class="time">${timeStr}</div>`;
        container.appendChild(div);
      });
    }

    // Auto update every second
    setInterval(() => {
      const selectedIdx = select.value;
      if (selectedIdx !== "") {
        updateClocks(countries[selectedIdx]);
      }
    }, 1000);

    // Change event
    select.addEventListener("change", e => {
      if (e.target.value !== "") {
        updateClocks(countries[e.target.value]);
      } else {
        document.getElementById('clock-container').innerHTML = '';
      }
    });
  </script>
</body>
</html>
