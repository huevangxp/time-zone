<!DOCTYPE html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ຕັ້ງເວລາການໂອນ - Digital Banking</title>

    <!-- Google Fonts for Lao (Noto Sans Lao) & English/Numbers (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Design Tokens & Theme Variables */
      :root {
        --primary-teal: #0b847c;
        --primary-teal-hover: #086b64;
        --primary-teal-light: #eaf4f3;
        --accent-yellow: #f19e38;
        --accent-yellow-hover: #d98826;
        --accent-red: #ef4444;
        --accent-red-light: #fff5f5;
        --accent-red-border: #fca5a5;
        --accent-green: #10b981;
        --accent-green-light: #ecfdf5;
        --bg-page: #f4f6fa;
        --bg-card: #ffffff;
        --bg-input: #f8fafc;
        --bg-input-hover: #f1f5f9;
        --text-dark: #0f172a;
        --text-muted: #64748b;
        --text-light: #ffffff;
        --border-color: #e2e8f0;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 20px rgba(15, 23, 42, 0.05);
        --shadow-lg: 0 20px 40px rgba(15, 23, 42, 0.12);
        --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Reset and Base Styles */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Noto Sans Lao", "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        background-color: var(--bg-page);
        color: var(--text-dark);
        min-height: 100vh;
        padding-bottom: 80px;
      }

      .number-font {
        font-family: "Inter", sans-serif;
      }

      /* Animations */
      @keyframes scaleIn {
        from { transform: scale(0.96); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes fadeInUp {
        from { transform: translateY(12px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      /* Top Navigation Bar */
      .top-nav {
        background-color: var(--primary-teal);
        box-shadow: var(--shadow-sm);
        width: 100%;
        overflow-x: auto;
        position: sticky;
        top: 0;
        z-index: 99;
      }

      .nav-container {
        max-width: 1280px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        min-width: 900px;
      }

      .nav-item {
        flex: 1;
        text-align: center;
        padding: 16px 12px;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        font-size: 13.5px;
        font-weight: 500;
        border-bottom: 3.5px solid transparent;
        transition: var(--transition-fast);
        cursor: pointer;
      }

      .nav-item svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
        transition: transform var(--transition-fast);
      }

      .nav-item:hover {
        color: var(--text-light);
        background-color: rgba(255, 255, 255, 0.05);
      }

      .nav-item:hover svg {
        transform: translateY(-2px);
      }

      .nav-item.active {
        color: var(--text-light);
        border-bottom-color: var(--text-light);
        font-weight: 600;
      }

      /* Highlight pay bill link as orange-gold */
      .nav-item.pay-bill-active {
        color: var(--accent-yellow);
      }
      .nav-item.pay-bill-active svg {
        fill: var(--accent-yellow);
      }
      .nav-item.pay-bill-active:hover {
        color: var(--accent-yellow-hover);
      }

      /* Navigation Divider */
      .nav-divider {
        width: 1px;
        height: 30px;
        background-color: rgba(255, 255, 255, 0.2);
        margin: 0 4px;
      }

      /* Main Layout */
      .main-content {
        max-width: 1280px;
        margin: 32px auto;
        padding: 0 24px;
        animation: fadeInUp 0.4s ease-out;
      }

      /* Section Header Title */
      .section-header {
        margin-bottom: 24px;
      }

      .section-title {
        color: var(--primary-teal);
        font-size: 22px;
        font-weight: 700;
      }

      /* Two Column Dashboard Grid */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 440px 1fr;
        gap: 32px;
        align-items: flex-start;
      }

      @media (max-width: 992px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Unified White Card wrapper enclosing everything */
      .dashboard-wrapper-card {
        background-color: var(--bg-card);
        border-radius: 28px;
        box-shadow: var(--shadow-md);
        padding: 32px;
        border: 1px solid var(--border-color);
      }

      /* LEFT COLUMN: CALENDAR BLOCK */
      .calendar-card {
        background-color: #ffffff;
        border: 1px solid var(--border-color);
        border-radius: 24px;
        overflow: hidden;
        margin-bottom: 24px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition-normal);
      }

      .calendar-header {
        background: linear-gradient(135deg, var(--primary-teal), #00bfa5);
        color: white;
        padding: 20px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 12px rgba(11, 132, 124, 0.12);
      }

      .calendar-title {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .calendar-arrow-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition-fast);
      }
      .calendar-arrow-btn:hover {
        background-color: rgba(255, 255, 255, 0.3);
        transform: scale(1.05);
      }

      .calendar-body {
        padding: 24px;
      }

      .calendar-weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        text-align: center;
        font-size: 13px;
        font-weight: 700;
        color: var(--primary-teal);
        margin-bottom: 16px;
        border-bottom: 1.5px solid var(--primary-teal-light);
        padding-bottom: 10px;
      }

      .calendar-days-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        row-gap: 10px;
        column-gap: 6px;
        text-align: center;
      }

      .calendar-day-cell {
        font-size: 14.5px;
        font-weight: 600;
        color: var(--text-dark);
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 14px;
        transition: var(--transition-fast);
        border: 1px solid transparent;
        position: relative;
      }

      .calendar-day-cell:hover:not(.empty-cell):not(.active-day) {
        background-color: var(--primary-teal-light);
        color: var(--primary-teal);
        border-color: rgba(11, 132, 124, 0.15);
      }

      .calendar-day-cell.empty-cell {
        color: #cbd5e1;
        cursor: default;
        opacity: 0.6;
      }

      .calendar-day-cell.active-day {
        background-color: var(--primary-teal);
        color: white !important;
        font-weight: 700;
        box-shadow: 0 8px 16px rgba(11, 132, 124, 0.25);
        border-color: var(--primary-teal);
      }

      /* Dot indicator for days with scheduled transfers */
      .schedule-dot-marker {
        position: absolute;
        bottom: 5px;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background-color: var(--accent-yellow);
      }
      .calendar-day-cell.active-day .schedule-dot-marker {
        background-color: white;
      }

      /* Calendar actions buttons row */
      .calendar-actions-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .cal-btn {
        border: none;
        border-radius: 14px;
        padding: 14px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: white;
        transition: var(--transition-normal);
        box-shadow: var(--shadow-sm);
      }

      .cal-btn.add-new {
        background-color: var(--primary-teal);
      }
      .cal-btn.add-new:hover {
        background-color: var(--primary-teal-hover);
        box-shadow: 0 6px 16px rgba(11, 132, 124, 0.25);
        transform: translateY(-1px);
      }
      .cal-btn.add-new:active {
        transform: translateY(1px);
      }

      .cal-btn.reset {
        background-color: #f1f5f9;
        color: #475569;
        border: 1px solid #e2e8f0;
      }
      .cal-btn.reset:hover {
        background-color: #e2e8f0;
        color: #334155;
      }

      /* RIGHT COLUMN: STATUS TABS & LIST */
      .list-container {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* Tabs selection block */
      .tabs-bar {
        background-color: #f1f5f9;
        border-radius: 16px;
        padding: 6px;
        display: flex;
        gap: 6px;
        border: 1px solid #e2e8f0;
      }

      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        color: #64748b;
        font-size: 14px;
        font-weight: 700;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
        transition: var(--transition-normal);
        text-align: center;
      }

      .tab-btn.active {
        background-color: #ffffff;
        color: var(--primary-teal);
        box-shadow: var(--shadow-sm);
        border: 1px solid #e2e8f0;
      }

      /* Filter Status Header block */
      .filter-status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 6px;
        font-size: 13.5px;
        font-weight: 700;
        color: var(--text-muted);
        min-height: 24px;
      }

      .clear-filter-btn {
        color: var(--primary-teal);
        cursor: pointer;
        font-size: 12.5px;
        transition: var(--transition-fast);
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .clear-filter-btn:hover {
        color: var(--primary-teal-hover);
        text-decoration: underline;
      }

      /* Schedule Item List Cards */
      .schedule-cards-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 320px;
      }

      .schedule-item-card {
        background-color: #ffffff;
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition-normal);
        animation: scaleIn 0.3s ease-out;
      }

      .schedule-item-card:hover {
        box-shadow: var(--shadow-md);
        border-color: rgba(11, 132, 124, 0.2);
        transform: translateY(-2px);
      }

      /* Scheduled Left Date Badge */
      .schedule-date-badge {
        background: linear-gradient(135deg, var(--primary-teal), #00bfa5);
        color: white;
        border-radius: 16px;
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 80px;
        height: 80px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(11, 132, 124, 0.15);
      }

      .badge-date-text {
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
      }

      .badge-status-tag {
        font-size: 10px;
        font-weight: 700;
        background-color: rgba(255, 255, 255, 0.2);
        padding: 3px 8px;
        border-radius: 6px;
        margin-top: 6px;
        letter-spacing: 0.3px;
      }

      .schedule-item-card.stopped .schedule-date-badge {
        background: linear-gradient(135deg, #94a3b8, #cbd5e1);
        box-shadow: none;
      }

      /* Scheduled Middle Details block */
      .schedule-info-block {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .info-name {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-dark);
      }

      .info-account {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text-muted);
      }

      .info-desc-row {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .info-desc-status {
        color: var(--primary-teal);
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .info-desc-status::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: var(--accent-green);
      }
      .schedule-item-card.stopped .info-desc-status {
        color: var(--accent-red);
      }
      .schedule-item-card.stopped .info-desc-status::before {
        background-color: var(--accent-red);
      }

      /* Amount display column */
      .schedule-amount-block {
        text-align: right;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 120px;
        margin-right: 8px;
      }

      .amount-val {
        font-size: 18px;
        font-weight: 700;
        color: var(--primary-teal);
      }

      .currency-label {
        font-size: 10.5px;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.5px;
      }

      .schedule-item-card.stopped .amount-val {
        color: #94a3b8;
      }

      /* STOP button layout */
      .stop-action-btn {
        background-color: var(--accent-red-light);
        border: 1px solid var(--accent-red-border);
        color: var(--accent-red);
        border-radius: 14px;
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: var(--transition-fast);
        box-shadow: 0 2px 5px rgba(239, 68, 68, 0.05);
      }

      .stop-action-btn:hover {
        background-color: #fee2e2;
        border-color: #fca5a5;
        transform: scale(1.02);
      }

      .stop-action-btn.stopped-btn {
        background-color: var(--primary-teal-light);
        border-color: rgba(11, 132, 124, 0.2);
        color: var(--primary-teal);
        box-shadow: 0 2px 5px rgba(11, 132, 124, 0.05);
      }
      .stop-action-btn.stopped-btn:hover {
        background-color: #dcfce7;
        border-color: #bbf7d0;
        transform: scale(1.02);
      }

      .chevron-arrow {
        font-size: 18px;
        color: #cbd5e1;
        font-weight: bold;
        padding-left: 4px;
      }

      /* Pagination controls */
      .pagination-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-top: 20px;
      }

      .page-btn {
        background-color: #ffffff;
        color: var(--text-dark);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: bold;
        transition: var(--transition-fast);
      }

      .page-btn:hover {
        background-color: #f1f5f9;
        border-color: #cbd5e1;
      }

      .page-indicator-box {
        background-color: var(--primary-teal-light);
        color: var(--primary-teal);
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        width: 48px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(11, 132, 124, 0.15);
      }

      /* MODAL DIALOGS */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-normal);
      }

      .modal-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .dialog-box {
        background-color: white;
        border-radius: 28px;
        width: 90%;
        max-width: 520px;
        padding: 32px;
        box-shadow: var(--shadow-lg);
        transform: scale(0.95);
        opacity: 0;
        transition: transform var(--transition-normal), opacity var(--transition-normal);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .modal-overlay.show .dialog-box {
        transform: scale(1);
        opacity: 1;
      }

      /* Header Banner inside Modal */
      .dialog-header-banner {
        text-align: center;
        margin-bottom: 24px;
      }

      .header-icon-circle {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background-color: var(--primary-teal-light);
        color: var(--primary-teal);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px auto;
        box-shadow: 0 4px 10px rgba(11, 132, 124, 0.1);
      }

      .header-icon-circle svg {
        width: 26px;
        height: 26px;
        fill: currentColor;
      }

      .dialog-header-title {
        font-size: 19px;
        font-weight: 700;
        color: var(--text-dark);
      }

      .dialog-header-subtitle {
        font-size: 12.5px;
        color: var(--text-muted);
        margin-top: 4px;
      }

      .dialog-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .dialog-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .dialog-lbl {
        font-size: 12.5px;
        font-weight: 700;
        color: #475569;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* Input with icon styling */
      .input-with-icon {
        position: relative;
        width: 100%;
        display: flex;
        align-items: center;
      }

      .input-with-icon .dialog-input,
      .input-with-icon .dialog-select {
        padding-left: 42px;
      }

      .input-icon-wrapper {
        position: absolute;
        left: 14px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        pointer-events: none;
        transition: var(--transition-fast);
      }

      .input-icon-wrapper svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .dialog-input, .dialog-select {
        background-color: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 500;
        outline: none;
        width: 100%;
        color: var(--text-dark);
        transition: var(--transition-fast);
      }

      .dialog-input:hover, .dialog-select:hover {
        background-color: var(--bg-input-hover);
        border-color: #cbd5e1;
      }

      .dialog-input:focus, .dialog-select:focus {
        border-color: var(--primary-teal);
        background-color: white;
        box-shadow: 0 0 0 3px rgba(11, 132, 124, 0.15);
      }
      
      .dialog-input:focus ~ .input-icon-wrapper,
      .dialog-select:focus ~ .input-icon-wrapper {
        color: var(--primary-teal);
      }

      /* Form Row helper */
      .form-row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 480px) {
        .form-row-2 {
          grid-template-columns: 1fr;
        }
      }

      .dialog-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 12px;
      }

      .dialog-btn {
        border: none;
        border-radius: 14px;
        padding: 14px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition-normal);
        text-align: center;
      }

      .dialog-btn.cancel {
        background-color: #f1f5f9;
        color: #475569;
        border: 1px solid #e2e8f0;
      }
      .dialog-btn.cancel:hover {
        background-color: #e2e8f0;
        color: #334155;
      }

      .dialog-btn.confirm {
        background-color: var(--primary-teal);
        color: white;
      }
      .dialog-btn.confirm:hover {
        background-color: var(--primary-teal-hover);
        box-shadow: 0 6px 16px rgba(11, 132, 124, 0.2);
        transform: translateY(-1px);
      }
      .dialog-btn.confirm:active {
        transform: translateY(1px);
      }

      /* TOAST MESSAGE */
      .toast-msg {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background-color: #0f172a;
        color: white;
        padding: 14px 28px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 14px;
        box-shadow: var(--shadow-lg);
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 1001;
        opacity: 0;
        transition: transform var(--transition-normal), opacity var(--transition-normal);
        border: 1px solid rgba(255,255,255,0.08);
      }

      .toast-msg.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast-icon {
        width: 18px;
        height: 18px;
        fill: var(--accent-green);
      }

      let selectedDay = null; // No default highlighted day on load to show all list items

      let activeFilter = 'active'; // default active tab filter

      // Load November 2025 Calendar
      function renderCalendar() {
        const calContainer = document.getElementById("calendarDays");
        calContainer.innerHTML = "";

        // November 2025 calendar days matching mockup
        // October padding (faded grey): 27, 28, 29, 30, 31
        const octPadding = [27, 28, 29, 30, 31];
        octPadding.forEach(day => {
          const div = document.createElement("div");
          div.className = "calendar-day-cell empty-cell";
          div.textContent = String(day).padStart(2, '0');
          calContainer.appendChild(div);
        });

        // November days: 01 to 30
        for (let i = 1; i <= 30; i++) {
          const div = document.createElement("div");
          div.className = "calendar-day-cell";
          if (i === selectedDay) {
            div.classList.add("active-day");
          }
          
          const textSpan = document.createElement("span");
          textSpan.textContent = String(i).padStart(2, '0');
          div.appendChild(textSpan);

          // Check if there is any scheduled item on this date and draw a dot
          const formattedDate = `${String(i).padStart(2, '0')}/11/2025`;
          const hasSchedule = schedulesDb.some(item => item.date === formattedDate);
          if (hasSchedule) {
            const dot = document.createElement("span");
            dot.className = "schedule-dot-marker";
            div.appendChild(dot);
          }

          div.onclick = () => selectDay(i);
          calContainer.appendChild(div);
        }

        // December padding (faded grey): 01 to 06
        const decPadding = [1, 2, 3, 4, 5, 6];
        decPadding.forEach(day => {
          const div = document.createElement("div");
          div.className = "calendar-day-cell empty-cell";
          div.textContent = String(day).padStart(2, '0');
          calContainer.appendChild(div);
        });
      }

      function selectDay(dayNum) {
        selectedDay = dayNum;
        selectedDate = `${String(dayNum).padStart(2, '0')}/11/2025`;
        renderCalendar();
        renderSchedulesList();
        showToast(`ສະແດງລາຍການວັນທີ ${selectedDate}`);
        
        // Auto-update form input date for convenience
        document.getElementById("formDate").value = selectedDate;
      }

      function resetCalendarSelection() {
        selectedDay = null;
        selectedDate = null;
        renderCalendar();
        renderSchedulesList();
        showToast("ສະແດງລາຍການທັງໝົດທຸກວັນທີ!");

        const listWrapper = document.getElementById("scheduleList");
        listWrapper.innerHTML = "";

        const statusTextContainer = document.getElementById("filterStatusText");
        let statusText = "";
        if (activeFilter === 'active') statusText = "ກຳລັງດຳເນີນ";
        else if (activeFilter === 'stopped') statusText = "ຢຸດດຳເນີນ";
        else statusText = "ລາຍການທັງໝົດ";

        if (selectedDate) {
          statusTextContainer.innerHTML = `
            <span>ສະແດງ: ${statusText} (ວັນທີ ${selectedDate})</span>
            <span class="clear-filter-btn" onclick="resetCalendarSelection()">✖ ລຶບການກັ່ນຕອງວັນທີ</span>
          `;
        } else {
          statusTextContainer.innerHTML = `<span>ສະແດງ: ${statusText} (ທຸກວັນທີ)</span>`;
        }

        // Filter database
        let filtered = [];
        if (activeFilter === 'active') {
          filtered = schedulesDb.filter(item => item.status === 'active');
        } else if (activeFilter === 'stopped') {
          filtered = schedulesDb.filter(item => item.status === 'stopped');
        } else {
          filtered = schedulesDb; // all
        }

        // Apply date filter
        if (selectedDate) {
          filtered = filtered.filter(item => item.date === selectedDate);
        }

        if (filtered.length === 0) {
          listWrapper.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 14px; padding: 60px 0;">ບໍ່ມີລາຍການຕັ້ງເວລາການໂອນ</div>`;
          return;
        }

        filtered.forEach(item => {
          const isStopped = item.status === 'stopped';
          const cardDiv = document.createElement("div");
          cardDiv.className = `schedule-item-card ${isStopped ? 'stopped' : ''}`;

          const day = item.date.split('/')[0];

          cardDiv.innerHTML = `
            <!-- Left badge -->
            <div class="schedule-date-badge">
              <span class="badge-date-text number-font">${day}</span>
              <span class="badge-status-tag">${isStopped ? 'ຢຸດດຳເນີນ' : 'ກຳລັງດຳເນີນ'}</span>
            </div>

            <!-- Middle details -->
            <div class="schedule-info-block">
              <span class="info-name">${item.name}</span>
              <span class="info-account number-font">ຕົ້ນທາງ: ${item.srcAcc.toUpperCase()} ➡️ ປາຍທາງ: ${item.account}</span>
              <div class="info-desc-row">
                <span class="info-desc-status">${isStopped ? 'ຢຸດດຳເນີນງານ' : 'ກຳລັງດຳເນີນ'}</span>
                <span>${item.remark}</span>
              </div>
            </div>

            <!-- Right Amount display -->
            <div class="schedule-amount-block">
              <span class="amount-val number-font">${item.amount}</span>
              <span class="currency-label">${item.currency}</span>
            </div>

            <!-- Action buttons -->
            <button class="stop-action-btn ${isStopped ? 'stopped-btn' : ''}" onclick="toggleStopSchedule(${item.id})">
              <span>${isStopped ? '▶ START' : '🛑 STOP'}</span>
            </button>
            <span class="chevron-arrow">&gt;</span>
          `;

          listWrapper.appendChild(cardDiv);
        });
      }

      // Toggle Active/Stopped state
      function toggleStopSchedule(id) {
        const item = schedulesDb.find(item => item.id === id);
        if (item) {
          if (item.status === 'active') {
            item.status = 'stopped';
            showToast("ຢຸດການໂອນເງິນຕັ້ງເວລາສຳເລັດ!");
          } else {
            item.status = 'active';
            showToast("ເລີ່ມການໂອນເງິນຕັ້ງເວລາຄືນໃໝ່ສຳເລັດ!");
          }
          renderCalendar(); // re-render dot markers which might update
          renderSchedulesList();
        }
      }

      // Tab filters
      function filterList(filterType) {
        activeFilter = filterType;
        
        // Update active tab buttons layout
        document.getElementById("tabActive").classList.remove("active");
        document.getElementById("tabStopped").classList.remove("active");
        document.getElementById("tabAll").classList.remove("active");

        if (filterType === 'active') document.getElementById("tabActive").classList.add("active");
        else if (filterType === 'stopped') document.getElementById("tabStopped").classList.add("active");
        else document.getElementById("tabAll").classList.add("active");

        renderSchedulesList();
      }

      // Toast feedback helper
      function showToast(message) {
        const toast = document.getElementById("toastMessage");
        document.getElementById("toastText").textContent = message;
        toast.classList.add("show");
        
        setTimeout(() => {
          toast.classList.remove("show");
        }, 2200);
      }

      // Modal Add Schedule Controls
      function openAddScheduleModal() {
        if (!selectedDate) {
          document.getElementById("formDate").value = "05/11/2025";
        } else {
          document.getElementById("formDate").value = selectedDate;
        }
        document.getElementById("addModalOverlay").classList.add("show");
      }

      function closeAddScheduleModal() {
        document.getElementById("addModalOverlay").classList.remove("show");
      }

      function closeAddScheduleModalViaOverlay(event) {
        if (event.target === document.getElementById("addModalOverlay")) {
          closeAddScheduleModal();
        }
      }

      function submitAddScheduleForm(event) {
        event.preventDefault();
        
        const srcAccVal = document.getElementById("formSrcAcc").value;
        const destName = document.getElementById("formDestName").value;
        const destAcc = document.getElementById("formDestAcc").value;
        const dateVal = document.getElementById("formDate").value;
        const formAmountVal = document.getElementById("formAmount").value;
        const currencyVal = document.getElementById("formCurrency").value;
        const descVal = document.getElementById("formDesc").value;

        // Formatted amount (adds comma separators)
        const formattedAmount = parseFloat(formAmountVal).toLocaleString('en-US', {
          minimumFractionDigits: formAmountVal.includes('.') ? 2 : 0,
          maximumFractionDigits: 2
        });

        // Append new scheduled item to mock DB
        const newItem = {
          id: schedulesDb.length + 1,
          date: dateVal,
          name: destName,
          account: destAcc,
          amount: formattedAmount,
          currency: currencyVal,
          srcAcc: srcAccVal,
          status: "active",
          remark: descVal || "ໂອນເງິນຕັ້ງເວລາ"
        };

        schedulesDb.unshift(newItem); // add to top of list
        closeAddScheduleModal();
        
        // Reset date filter to show the new item at the top of the general active list
        selectedDay = null;
        selectedDate = null;
        
        filterList('active'); // switch to active list to show added item
        renderCalendar(); // redraw dot markers on calendar
        showToast("ເພີ່ມການໂອນເງິນຕັ້ງເວລາໃໝ່ສຳເລັດ!");
      }

      // Initial loading sequence
      window.onload = () => {
        renderCalendar();
        renderSchedulesList();
      };
    </script>
  </body>
</html>
