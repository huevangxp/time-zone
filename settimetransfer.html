<!DOCTYPE html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ຕັ້ງເວລາການໂອນ - Digital Banking</title>

    <!-- Google Fonts for Lao (Noto Sans Lao) & English/Numbers (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Design Tokens & Theme Variables */
      :root {
        --primary-teal: #0b847c;
        --primary-teal-hover: #086b64;
        --primary-teal-light: #eaf4f3;
        --accent-yellow: #f19e38;
        --accent-yellow-hover: #d98826;
        --accent-red: #ef4444;
        --accent-red-light: #fff5f5;
        --accent-red-border: #fca5a5;
        --accent-green: #10b981;
        --accent-green-light: #ecfdf5;
        --bg-page: #f2f1f7;
        --bg-card: #ffffff;
        --bg-input: #f1f3f7;
        --bg-input-hover: #e2e8f0;
        --text-dark: #1a202c;
        --text-muted: #718096;
        --text-light: #ffffff;
        --border-color: #e2e8f0;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.05);
        --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.08);
        --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Reset and Base Styles */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Noto Sans Lao", "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        background-color: var(--bg-page);
        color: var(--text-dark);
        min-height: 100vh;
        padding-bottom: 60px;
      }

      .number-font {
        font-family: "Inter", sans-serif;
      }

      /* Top Navigation Bar */
      .top-nav {
        background-color: var(--primary-teal);
        box-shadow: var(--shadow-sm);
        width: 100%;
        overflow-x: auto;
        position: sticky;
        top: 0;
        z-index: 99;
      }

      .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
        min-width: 900px;
      }

      .nav-item {
        flex: 1;
        text-align: center;
        padding: 16px 10px;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 500;
        border-bottom: 3.5px solid transparent;
        transition: var(--transition-fast);
        cursor: pointer;
      }

      .nav-item svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
        transition: transform var(--transition-fast);
      }

      .nav-item:hover {
        color: var(--text-light);
        background-color: rgba(255, 255, 255, 0.05);
      }

      .nav-item:hover svg {
        transform: translateY(-2px);
      }

      .nav-item.active {
        color: var(--text-light);
        border-bottom-color: var(--text-light);
        font-weight: 600;
      }

      /* Highlight pay bill link as orange-gold */
      .nav-item.pay-bill-active {
        color: var(--accent-yellow);
      }
      .nav-item.pay-bill-active svg {
        fill: var(--accent-yellow);
      }

      /* Navigation Divider */
      .nav-divider {
        width: 1px;
        height: 30px;
        background-color: rgba(255, 255, 255, 0.2);
        margin: 0 4px;
      }

      /* Main Layout */
      .main-content {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 20px;
      }

      /* Section Header Title */
      .section-header {
        margin-bottom: 20px;
      }

      .section-title {
        color: var(--primary-teal);
        font-size: 16px;
        font-weight: 700;
      }

      /* Two Column Dashboard Grid */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 30px;
        align-items: flex-start;
      }

      @media (max-width: 900px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Unified White Card wrapper enclosing everything */
      .dashboard-wrapper-card {
        background-color: var(--bg-card);
        border-radius: 28px;
        box-shadow: var(--shadow-md);
        padding: 24px;
        border: 1px solid var(--border-color);
      }

      /* LEFT COLUMN: CALENDAR BLOCK */
      .calendar-card {
        background-color: #ffffff;
        border: 1.5px solid var(--primary-teal);
        border-radius: 24px;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .calendar-header {
        background-color: var(--primary-teal);
        color: white;
        padding: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .calendar-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .calendar-arrow-btn {
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: var(--transition-fast);
      }
      .calendar-arrow-btn:hover {
        background-color: rgba(255,255,255,0.15);
      }

      .calendar-body {
        padding: 16px;
      }

      .calendar-weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        text-align: center;
        font-size: 12px;
        font-weight: 700;
        color: var(--primary-teal);
        margin-bottom: 12px;
        border-bottom: 1.5px solid var(--primary-teal-light);
        padding-bottom: 8px;
      }

      .calendar-days-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        row-gap: 8px;
        text-align: center;
      }

      .calendar-day-cell {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--text-dark);
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 50%;
        transition: var(--transition-fast);
      }

      .calendar-day-cell:hover:not(.empty-cell):not(.active-day) {
        background-color: #f1f3f7;
      }

      .calendar-day-cell.empty-cell {
        color: #cbd5e1;
        cursor: default;
      }

      .calendar-day-cell.active-day {
        background-color: var(--primary-teal);
        color: white !important;
        font-weight: 700;
        box-shadow: 0 4px 10px rgba(11, 132, 124, 0.25);
      }

      /* Calendar actions buttons row */
      .calendar-actions-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .cal-btn {
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 13.5px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: white;
        transition: var(--transition-normal);
      }

      .cal-btn.add-new {
        background-color: var(--primary-teal);
      }
      .cal-btn.add-new:hover {
        background-color: var(--primary-teal-hover);
        box-shadow: 0 4px 12px rgba(11, 132, 124, 0.25);
      }

      .cal-btn.reset {
        background-color: #9ca3af;
      }
      .cal-btn.reset:hover {
        background-color: #7b838f;
      }

      /* RIGHT COLUMN: STATUS TABS & LIST */
      .list-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Tabs selection block */
      .tabs-bar {
        background-color: var(--primary-teal);
        border-radius: 12px;
        padding: 4px;
        display: flex;
        gap: 4px;
      }

      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        color: white;
        font-size: 13.5px;
        font-weight: 700;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition-normal);
        text-align: center;
      }

      .tab-btn.active {
        background-color: #ffffff;
        color: var(--primary-teal);
        box-shadow: var(--shadow-sm);
      }

      /* Schedule Item List Cards */
      .schedule-cards-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 240px;
      }

      .schedule-item-card {
        background-color: #ffffff;
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition-normal);
      }

      .schedule-item-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }

      /* Scheduled Left Date Badge */
      .schedule-date-badge {
        background-color: var(--primary-teal);
        color: white;
        border-radius: 12px;
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-width: 96px;
        text-align: center;
      }

      .badge-date-text {
        font-size: 12.5px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .badge-status-tag {
        font-size: 9.5px;
        font-weight: 700;
        background-color: rgba(255, 255, 255, 0.2);
        padding: 2px 6px;
        border-radius: 4px;
      }

      .schedule-item-card.stopped .schedule-date-badge {
        background-color: #94a3b8;
      }

      /* Scheduled Middle Details block */
      .schedule-info-block {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .info-name {
        font-size: 13.5px;
        font-weight: 700;
        color: var(--text-dark);
      }

      .info-account {
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text-muted);
      }

      .info-desc-row {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        display: flex;
        gap: 8px;
      }

      .info-desc-status {
        color: var(--primary-teal);
        font-weight: 600;
      }
      .schedule-item-card.stopped .info-desc-status {
        color: var(--accent-red);
      }

      /* STOP button layout */
      .stop-action-btn {
        background: none;
        border: 1px solid var(--accent-red);
        color: var(--accent-red);
        border-radius: 50px;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: var(--transition-fast);
      }

      .stop-action-btn:hover {
        background-color: var(--accent-red-light);
      }

      .stop-action-btn.stopped-btn {
        border-color: var(--primary-teal);
        color: var(--primary-teal);
      }
      .stop-action-btn.stopped-btn:hover {
        background-color: var(--primary-teal-light);
      }

      .chevron-arrow {
        font-size: 16px;
        color: #cbd5e1;
        font-weight: bold;
        padding-left: 4px;
      }

      /* Pagination controls */
      .pagination-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
      }

      .page-btn {
        background-color: var(--primary-teal);
        color: white;
        border: none;
        border-radius: 6px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: bold;
        transition: var(--transition-fast);
      }

      .page-btn:hover {
        background-color: var(--primary-teal-hover);
      }

      .page-indicator-box {
        background-color: #e2e8f0;
        color: var(--text-dark);
        border-radius: 6px;
        font-size: 13.5px;
        font-weight: 700;
        width: 44px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* MODAL DIALOGS */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition-normal);
      }

      .modal-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }

      .dialog-box {
        background-color: white;
        border-radius: 20px;
        width: 90%;
        max-width: 420px;
        padding: 24px;
        box-shadow: var(--shadow-lg);
        transform: scale(0.9);
        transition: transform var(--transition-normal);
      }

      .modal-overlay.show .dialog-box {
        transform: scale(1);
      }

      .dialog-header {
        font-size: 16px;
        font-weight: 700;
        color: var(--primary-teal);
        margin-bottom: 16px;
        border-bottom: 1.5px solid var(--primary-teal-light);
        padding-bottom: 8px;
      }

      .dialog-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .dialog-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .dialog-lbl {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
      }

      .dialog-input, .dialog-select {
        background-color: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 10px;
        font-size: 13.5px;
        outline: none;
        width: 100%;
      }

      .dialog-input:focus, .dialog-select:focus {
        border-color: var(--primary-teal);
        background-color: white;
      }

      .dialog-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 18px;
      }

      .dialog-btn {
        border: none;
        border-radius: 8px;
        padding: 10px;
        font-size: 13.5px;
        font-weight: 700;
        cursor: pointer;
      }

      .dialog-btn.cancel {
        background-color: #cbd5e1;
        color: var(--text-dark);
      }
      .dialog-btn.cancel:hover {
        background-color: #b8c1cc;
      }

      .dialog-btn.confirm {
        background-color: var(--primary-teal);
        color: white;
      }
      .dialog-btn.confirm:hover {
        background-color: var(--primary-teal-hover);
      }

      /* TOAST MESSAGE */
      .toast-msg {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background-color: var(--primary-teal);
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 13.5px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 1001;
        opacity: 0;
        transition: transform var(--transition-normal), opacity var(--transition-normal);
      }

      .toast-msg.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast-icon {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
    </style>
  </head>

    <!-- Main Container -->
    <main class="main-content">
      <!-- Section Title -->
      <div class="section-header">
        <h2 class="section-title">ຕັ້ງເວລາການໂອນ</h2>
      </div>

      <!-- Main card wrapper enclosing both sides -->
      <div class="dashboard-wrapper-card">
        <div class="dashboard-grid">
          
          <!-- LEFT COLUMN: CALENDAR -->
          <div>
            <div class="calendar-card">
              <div class="calendar-header">
                <button class="calendar-arrow-btn">&lt;</button>
                <span class="calendar-title">ພະຈິກ 2025</span>
                <button class="calendar-arrow-btn">&gt;</button>
              </div>
              <div class="calendar-body">
                <div class="calendar-weekdays">
                  <div>ຈັນ</div>
                  <div>ອັງຄານ</div>
                  <div>ພຸດ</div>
                  <div>ພະຫັດ</div>
                  <div>ສຸກ</div>
                  <div>ເສົາ</div>
                  <div>ອາທິດ</div>
                </div>
                <div class="calendar-days-grid" id="calendarDays">
                  <!-- Generated by JS (mocking November 2025) -->
                </div>
              </div>
            </div>

            <!-- Calendar action buttons -->
            <div class="calendar-actions-row">
              <button class="cal-btn add-new" onclick="openAddScheduleModal()">
                <span>+ ເພີ່ມໃໝ່</span>
              </button>
              <button class="cal-btn reset" onclick="resetCalendarSelection()">
                <span>↻ ເລີ່ມການເລືອກໃໝ່</span>
              </button>
            </div>
          </div>

          <!-- RIGHT COLUMN: SCHEDULE LISTS -->
          <div class="list-container">
            <!-- Tabs selection -->
            <div class="tabs-bar">
              <button class="tab-btn active" id="tabActive" onclick="filterList('active')">ກຳລັງດຳເນີນ</button>
              <button class="tab-btn" id="tabStopped" onclick="filterList('stopped')">ຢຸດດຳເນີນ</button>
              <button class="tab-btn" id="tabAll" onclick="filterList('all')">ລາຍການທັງໝົດ</button>
            </div>

            <!-- Schedule Items -->
            <div class="schedule-cards-list" id="scheduleList">
              <!-- Rendered Dynamically by JS -->
            </div>

            <!-- Bottom pagination -->
            <div class="pagination-row">
              <button class="page-btn">&lt;</button>
              <div class="page-indicator-box number-font">1</div>
              <button class="page-btn">&gt;</button>
            </div>
          </div>

        </div>
      </div>
    </main>

    <!-- ADD SCHEDULE MODAL FORM -->
    <div class="modal-overlay" id="addModalOverlay">
      <div class="dialog-box">
        <h3 class="dialog-header">ເພີ່ມລາຍການຕັ້ງເວລາການໂອນ</h3>
        <form class="dialog-form" onsubmit="submitAddScheduleForm(event)">
          
          <div class="dialog-group">
            <label class="dialog-lbl">ເລືອກບັນຊີຕົ້ນທາງ</label>
            <select class="dialog-select" id="formSrcAcc" required>
              <option value="bcel">ບັນຊີ ກີບ LAK (101-***-299)</option>
              <option value="ldb">ບັນຊີ ບາດ THB (202-***-455)</option>
              <option value="apb">ບັນຊີ ໂດລາ USD (303-***-881)</option>
            </select>
          </div>

          <div class="dialog-group">
            <label class="dialog-lbl">ຊື່ຜູ້ຮັບປາຍທາງ</label>
            <input type="text" class="dialog-input" id="formDestName" placeholder="ຊື່ ແລະ ນາມສະກຸນ" value="ທ່ານ ຊີວ່າງ ຊູ້ມີ" required />
          </div>

          <div class="dialog-group">
            <label class="dialog-lbl">ເລກບັນຊີປາຍທາງ</label>
            <input type="text" class="dialog-input number-font" id="formDestAcc" placeholder="ເລກບັນຊີ 15 ຫຼັກ" value="010XXXXXXXX625" required />
          </div>

          <div class="dialog-group">
            <label class="dialog-lbl">ວັນທີໂອນຕັ້ງເວລາ (ວັນທີ/ເດືອນ/ປີ)</label>
            <input type="text" class="dialog-input number-font" id="formDate" value="05/11/2025" placeholder="DD/MM/YYYY" required />
          </div>

          <div class="dialog-group">
            <label class="dialog-lbl">ຈຳນວນເງິນໂອນ</label>
            <input type="number" class="dialog-input number-font" id="formAmount" placeholder="ຈຳນວນເງິນ" value="100000" required />
          </div>

          <div class="dialog-group">
            <label class="dialog-lbl">ຄຳອະທິບາຍ</label>
            <input type="text" class="dialog-input" id="formDesc" value="ໂອນເງິນຕັ້ງເວລາ" placeholder="ປ້ອນຄຳອະທິບາຍ" required />
          </div>

          <div class="dialog-buttons">
            <button type="button" class="dialog-btn cancel" onclick="closeAddScheduleModal()">ຍົກເລີກ</button>
            <button type="submit" class="dialog-btn confirm">ຢືນຢັນ</button>
          </div>

        </form>
      </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div class="toast-msg" id="toastMessage">
      <svg class="toast-icon" viewBox="0 0 24 24">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
      </svg>
      <span id="toastText">ຢຸດການໂອນເງິນຕັ້ງເວລາສຳເລັດ!</span>
    </div>

    <!-- JS Codes for Calendar, Lists and Toggle simulations -->
    <script>
      // Mock Schedules database
      let schedulesDb = [
        {
          id: 1,
          date: "05/11/2025",
          name: "ທ່ານ ຊີວ່າງ ຊູ້ມີ",
          account: "010XXXXXXXX625",
          status: "active", // active or stopped
          remark: "ກຳລັງດຳເນີນ  ລາຍລະອຽດການດຳເນີນງານ"
        },
        {
          id: 2,
          date: "05/11/2025",
          name: "ທ່ານ ຊີວ່າງ ຊູ້ມີ",
          account: "010XXXXXXXX625",
          status: "active",
          remark: "ກຳລັງດຳເນີນ  ລາຍລະອຽດການດຳເນີນງານ"
        },
        {
          id: 3,
          date: "05/11/2025",
          name: "ທ່ານ ຊີວ່າງ ຊູ້ມີ",
          account: "010XXXXXXXX625",
          status: "active",
          remark: "ກຳລັງດຳເນີນ  ລາຍລະອຽດການດຳເນີນງານ"
        }
      ];

      let selectedDay = 5; // Default highlighted day (05)
      let activeFilter = 'active'; // default active tab filter

      // Load November 2025 Calendar
      function renderCalendar() {
        const calContainer = document.getElementById("calendarDays");
        calContainer.innerHTML = "";

        // November 2025 calendar days matching mockup
        // October padding (faded grey): 27, 28, 29, 30, 31
        const octPadding = [27, 28, 29, 30, 31];
        octPadding.forEach(day => {
          const div = document.createElement("div");
          div.className = "calendar-day-cell empty-cell";
          div.textContent = String(day).padStart(2, '0');
          calContainer.appendChild(div);
        });

        // November days: 01 to 30
        for (let i = 1; i <= 30; i++) {
          const div = document.createElement("div");
          div.className = "calendar-day-cell";
          if (i === selectedDay) {
            div.classList.add("active-day");
          }
          div.textContent = String(i).padStart(2, '0');
          div.onclick = () => selectDay(i);
          calContainer.appendChild(div);
        }

        // December padding (faded grey): 01 to 06
        const decPadding = [1, 2, 3, 4, 5, 6];
        decPadding.forEach(day => {
          const div = document.createElement("div");
          div.className = "calendar-day-cell empty-cell";
          div.textContent = String(day).padStart(2, '0');
          calContainer.appendChild(div);
        });
      }

      function selectDay(dayNum) {
        selectedDay = dayNum;
        renderCalendar();
        showToast(`ເລືອກວັນທີ ${String(dayNum).padStart(2, '0')}/11/2025 ສຳເລັດ!`);
        
        // Auto-update form input date for convenience
        document.getElementById("formDate").value = `${String(dayNum).padStart(2, '0')}/11/2025`;
      }

      function resetCalendarSelection() {
        selectedDay = 5;
        renderCalendar();
        showToast("ຄືນຄ່າການເລືອກວັນທີແລ້ວ!");
      }

      // Render Scheduled List Items
      function renderSchedulesList() {
        const listWrapper = document.getElementById("scheduleList");
        listWrapper.innerHTML = "";

        // Filter database
        let filtered = [];
        if (activeFilter === 'active') {
          filtered = schedulesDb.filter(item => item.status === 'active');
        } else if (activeFilter === 'stopped') {
          filtered = schedulesDb.filter(item => item.status === 'stopped');
        } else {
          filtered = schedulesDb; // all
        }

        if (filtered.length === 0) {
          listWrapper.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 40px 0;">ບໍ່ມີລາຍການຕັ້ງເວລາການໂອນ</div>`;
          return;
        }

        filtered.forEach(item => {
          const isStopped = item.status === 'stopped';
          const cardDiv = document.createElement("div");
          cardDiv.className = `schedule-item-card ${isStopped ? 'stopped' : ''}`;

          cardDiv.innerHTML = `
            <!-- Left badge -->
            <div class="schedule-date-badge">
              <span class="badge-date-text number-font">${item.date}</span>
              <span class="badge-status-tag">${isStopped ? 'ຢຸດດຳເນີນ' : 'ກຳລັງດຳເນີນ'}</span>
            </div>

            <!-- Middle details -->
            <div class="schedule-info-block">
              <span class="info-name">${item.name}</span>
              <span class="info-account number-font">${item.account}</span>
              <div class="info-desc-row">
                <span class="info-desc-status">${isStopped ? 'ຢຸດດຳເນີນງານ' : 'ກຳລັງດຳເນີນ'}</span>
                <span>ລາຍລະອຽດການດຳເນີນງານ</span>
              </div>
            </div>

            <!-- Action buttons -->
            <button class="stop-action-btn ${isStopped ? 'stopped-btn' : ''}" onclick="toggleStopSchedule(${item.id})">
              <span>${isStopped ? '▶ START' : '🛑 STOP'}</span>
            </button>
            <span class="chevron-arrow">&gt;</span>
          `;

          listWrapper.appendChild(cardDiv);
        });
      }

      // Toggle Active/Stopped state
      function toggleStopSchedule(id) {
        const item = schedulesDb.find(item => item.id === id);
        if (item) {
          if (item.status === 'active') {
            item.status = 'stopped';
            item.remark = 'ຢຸດດຳເນີນງານ  ລາຍລະອຽດການດຳເນີນງານ';
            showToast("ຢຸດການໂອນເງິນຕັ້ງເວລາສຳເລັດ!");
          } else {
            item.status = 'active';
            item.remark = 'ກຳລັງດຳເນີນ  ລາຍລະອຽດການດຳເນີນງານ';
            showToast("ເລີ່ມການໂອນເງິນຕັ້ງເວລາຄືນໃໝ່ສຳເລັດ!");
          }
          renderSchedulesList();
        }
      }

      // Tab filters
      function filterList(filterType) {
        activeFilter = filterType;
        
        // Update active tab buttons layout
        document.getElementById("tabActive").classList.remove("active");
        document.getElementById("tabStopped").classList.remove("active");
        document.getElementById("tabAll").classList.remove("active");

        if (filterType === 'active') document.getElementById("tabActive").classList.add("active");
        else if (filterType === 'stopped') document.getElementById("tabStopped").classList.add("active");
        else document.getElementById("tabAll").classList.add("active");

        renderSchedulesList();
      }

      // Toast feedback helper
      function showToast(message) {
        const toast = document.getElementById("toastMessage");
        document.getElementById("toastText").textContent = message;
        toast.classList.add("show");
        
        setTimeout(() => {
          toast.classList.remove("show");
        }, 2200);
      }

      // Modal Add Schedule Controls
      function openAddScheduleModal() {
        document.getElementById("addModalOverlay").classList.add("show");
      }

      function closeAddScheduleModal() {
        document.getElementById("addModalOverlay").classList.remove("show");
      }

      function submitAddScheduleForm(event) {
        event.preventDefault();
        
        const destName = document.getElementById("formDestName").value;
        const destAcc = document.getElementById("formDestAcc").value;
        const dateVal = document.getElementById("formDate").value;

        // Append new scheduled item to mock DB
        const newItem = {
          id: schedulesDb.length + 1,
          date: dateVal,
          name: destName,
          account: destAcc,
          status: "active",
          remark: "ກຳລັງດຳເນີນ  ລາຍລະອຽດການດຳເນີນງານ"
        };

        schedulesDb.unshift(newItem); // add to top of list
        closeAddScheduleModal();
        filterList('active'); // switch to active list to show added item
        showToast("ເພີ່ມການໂອນເງິນຕັ້ງເວລາໃໝ່ສຳເລັດ!");
      }

      // Initial loading sequence
      window.onload = () => {
        renderCalendar();
        renderSchedulesList();
      };
    </script>
  </body>
</html>
